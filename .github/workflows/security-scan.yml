name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # 매주 월요일 오전 9시 (KST)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install pip-audit bandit

      - name: Dependency Vulnerability Scan
        run: |
          pip-audit -r requirements.txt || true

      - name: Static Analysis (Bandit)
        run: |
          bandit -r src -ll || true

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filesystem Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH'
          exit-code: 0

      - name: Aggregate Results
        run: |
          echo "## Security Scan Summary"
          echo "| Tool | Status |"
          echo "|------|--------|"
          echo "| pip-audit | Completed |"
          echo "| Bandit | Completed |"
          echo "| Gitleaks | Completed |"
          echo "| Trivy | Completed |"

      - name: Create SAR Ball
        run: |
          combined_sarif="combined.sarif"
          echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/SARIF/sarif-schema-2.1.0","runs":[]}' > "$combined_sarif"

          for sar_file in *.sarif; do
            if [ -f "$sar_file" ] && [ "$sar_file" != "$combined_sarif" ]; then
              echo "Combining $sar_file ..."
              cat "$sar_file" >> "$combined_sarif"
            fi
          done

          echo "SAR ball created: $combined_sarif"

      - name: Upload SAR
        uses: actions/upload-artifact@v4
        with:
          name: SAR_BALL_RESULTS
          path: combined.sarif
          retention-days: 30

      - name: Slack Alert
        if: failure() && vars.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            -d '{"text":"🚨 Security vulnerabilities found in ${{ github.repository }}\nPlease review the GitHub Actions tab."}' \
            "${{ vars.SLACK_WEBHOOK_URL }}"
